<text x="440" y="400" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">&lt;think&gt;... → 숨김, 사용자에게 표시하지 않음</text>
