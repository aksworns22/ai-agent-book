<rect x="388" y="210" width="300" height="50" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="538" y="235" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Agent 프레임워크가 두 도구를 병렬 실행</text>
