<text x="490" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central">주로 신제품군이 성장을 이끌었다.</text>
<text x="660" y="200" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">→ ACME + 2분기 + 매출 증가와 정확히 일치</text>
