<text x="220" y="170" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">질문: &quot;이 회사&quot;는 어디인가? 몇 년도인가?</text>
