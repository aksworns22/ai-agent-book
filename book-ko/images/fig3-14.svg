<text x="560.0" y="338.7" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">(프롬프트 캐싱)</text>
