<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 920 380" width="920" height="380" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>
<rect x="340" y="250" width="240" height="90" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="460" y="278" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">작업 기억</text>
<text x="460" y="302" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Working Memory</text>
<text x="460" y="322" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">현재 작업 상태</text>
<rect x="60" y="80" width="200" height="84" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="160" y="104" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">일화 기억</text>
<text x="160" y="128" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Episodic</text>
<text x="160" y="148" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">메타데이터가 있는 사건 순서</text>
<rect x="360" y="80" width="200" height="84" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="460" y="104" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">의미 기억</text>
<text x="460" y="128" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Semantic</text>
<text x="460" y="148" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">추상화한 일반 지식</text>
<rect x="660" y="80" width="200" height="84" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="760" y="104" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">절차 기억</text>
<text x="760" y="128" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Procedural</text>
<text x="760" y="148" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">재사용 가능한 행동 절차</text>
<line x1="200" y1="168" x2="410" y2="246" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<line x1="430" y1="246" x2="250" y2="168" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<line x1="460" y1="164" x2="460" y2="246" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<line x1="460" y1="246" x2="470" y2="164" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<line x1="720" y1="168" x2="510" y2="246" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<line x1="490" y1="246" x2="700" y2="164" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<text x="250" y="210" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">선택적으로 이동 ↑</text>
<text x="560" y="210" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">↓ 활성화하여 불러오기</text>
<text x="460" y="60" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">장기 기억(세션 간)</text>
<text x="460" y="372" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">작업 기억↔장기 기억: 중요한 정보는 선택 저장, 관련 메모리는 필요할 때 활성화</text>
</svg>