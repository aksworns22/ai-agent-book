<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 880 515" width="880" height="515" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>
<rect x="60" y="55" width="180" height="50" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="150" y="72" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">먼지 → 별</text>
<text x="150" y="92" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">물리 법칙</text>
<line x1="240" y1="80" x2="255" y2="80" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="260" y="55" width="180" height="50" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="350" y="72" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">별 → 행성</text>
<text x="350" y="92" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">중력에 의한 집합</text>
<line x1="440" y1="80" x2="455" y2="80" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="460" y="55" width="180" height="50" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="550" y="72" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">행성 → 생명</text>
<text x="550" y="92" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">DNA 자기 복제</text>
<line x1="640" y1="80" x2="655" y2="80" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="660" y="55" width="180" height="50" rx="6" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="750" y="72" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">생명 → Agent</text>
<text x="750" y="92" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="normal">코드 부트스트래핑</text>
<line x1="30" y1="120" x2="850" y2="120" stroke="#999999" stroke-width="2" stroke-dasharray="8,4"/>
<rect x="30" y="135" width="400" height="70" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="230" y="155" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">DNA 자기 복제: 무작위 돌연변이 + 자연 선택</text>
<text x="230" y="177" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="9" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">자신을 이해하지 못함 · 의도적으로 수정하지 못함 · 37억 년의 맹목적 시행착오</text>
<rect x="450" y="135" width="400" height="70" rx="6" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="650" y="155" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">Agent 부트스트래핑: 코드 이해 + 의도적 설계</text>
<text x="650" y="177" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="10.5" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="normal">자신의 메커니즘 이해 · 목적을 갖고 생성 · 모범 사례 상속</text>
<rect x="20" y="225" width="390" height="295" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="215" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">원본 Agent(자체 코드)</text>
<rect x="30" y="265" width="175" height="124" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="118" y="285" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">시스템 프롬프트</text>
<text x="40" y="308" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="8.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">당신은 항공사 고객 서비스 Agent입니다</text>
<text x="40" y="326" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">취소 규칙: ...</text>
<text x="40" y="344" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">연결 규칙: ...</text>
<text x="40" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Tool: cancel_order</text>
<rect x="215" y="265" width="185" height="124" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="308" y="285" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Agent 프레임워크 코드</text>
<text x="225" y="308" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">loop:</text>
<text x="225" y="326" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  msg = llm(ctx)</text>
<text x="225" y="344" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  if tool_call:</text>
<text x="225" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">    exec(tool)</text>
<rect x="30" y="400" width="370" height="54" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="215" y="419" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="15.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">도구 정의 + MCP 통합 + 메시지 형식</text>
<text x="215" y="438" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">검증된 고품질 구현</text>
<text x="440" y="215" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">복사 + 수정</text>
<line x1="410" y1="375" x2="470" y2="375" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="470" y="225" width="390" height="295" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="665" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">새 Agent(의도적 수정 후)</text>
<rect x="480" y="265" width="180" height="124" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="570" y="285" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">새 시스템 프롬프트</text>
<text x="490" y="308" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="7.5" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">당신은 전자 상거래 고객 서비스 Agent입니다</text>
<text x="490" y="326" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">환불 규칙: ...</text>
<text x="490" y="344" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">배송 조회: ...</text>
<text x="490" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Tool: refund_order</text>
<rect x="670" y="265" width="180" height="124" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="760" y="285" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">상속한 프레임워크 코드</text>
<text x="680" y="308" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">loop:</text>
<text x="680" y="326" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  msg = llm(ctx)</text>
<text x="680" y="344" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  if tool_call:</text>
<text x="680" y="362" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">    exec(tool)</text>
<rect x="480" y="400" width="370" height="54" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="665" y="419" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">새 도구 + 새 비즈니스 로직</text>
<text x="665" y="438" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">아키텍처 프레임워크 완전 상속 → 품질 보장</text>
</svg>