<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 880 570" width="880" height="570" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>
<rect x="30" y="60" width="280" height="55" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="170" y="80" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">사용자 요구 사항</text>
<text x="170" y="98" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="10.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">&quot;전자 상거래 환불 고객 서비스 Agent를 만들어 줘&quot;</text>
<line x1="170" y1="115" x2="170" y2="145" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="20" y="145" width="840" height="230" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="440" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">메타 Agent(Coding Agent)</text>
<rect x="35" y="185" width="190" height="170" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="130" y="205" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">① 참조 코드 읽기</text>
<text x="45" y="228" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">read_file:</text>
<text x="45" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  agent.py</text>
<text x="45" y="268" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  tools/*.py</text>
<text x="45" y="288" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  system_prompt.md</text>
<text x="45" y="308" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  config.yaml</text>
<text x="45" y="332" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="11" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">→ 아키텍처 패턴 이해</text>
<line x1="225" y1="270" x2="248" y2="270" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="248" y="185" width="190" height="170" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="343" y="205" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">② scaffold 복사</text>
<text x="258" y="228" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">cp -r reference/</text>
<text x="258" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  → new_agent/</text>
<text x="258" y="278" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">유지:</text>
<text x="258" y="298" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  Agent 루프 프레임워크</text>
<text x="258" y="318" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="11" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  메시지 형식 / KV 최적화</text>
<line x1="438" y1="270" x2="461" y2="270" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="461" y="185" width="190" height="170" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="556" y="205" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="15" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">③ 필요한 부분만 수정</text>
<text x="471" y="228" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">edit_file:</text>
<text x="471" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  system_prompt.md</text>
<text x="471" y="268" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 전자 상거래 환불 규칙</text>
<text x="471" y="290" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  tools/refund.py</text>
<text x="471" y="310" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 환불 도구 추가</text>
<text x="471" y="332" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  config.yaml</text>
<line x1="651" y1="270" x2="674" y2="270" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="674" y="185" width="175" height="170" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="761" y="205" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">④ 검증 테스트</text>
<text x="684" y="228" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">bash:</text>
<text x="684" y="248" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">  python agent.py</text>
<text x="684" y="270" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 새 Agent 시작</text>
<text x="684" y="290" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 테스트 메시지 전송</text>
<text x="684" y="310" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 도구 호출 확인</text>
<text x="684" y="330" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">  → 대화 흐름 검증</text>
<line x1="440.0" y1="375" x2="440.0" y2="410" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="115" y="410" width="700" height="90" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="465" y="432" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">생성된 새 Agent</text>
<rect x="135" y="448" width="170" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="220" y="462" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central">system_prompt.md</text>
<text x="220" y="480" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">전자 상거래 환불 규칙</text>
<rect x="313" y="448" width="170" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="398" y="462" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central">tools/refund.py</text>
<text x="398" y="480" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">환불 / 조회 도구</text>
<rect x="491" y="448" width="170" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="576" y="462" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central">agent.py</text>
<text x="576" y="480" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">상속한 프레임워크 코드</text>
<rect x="669" y="448" width="170" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="754" y="462" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central">config.yaml</text>
<text x="754" y="480" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">모델 / 매개변수 설정</text>
<line x1="30" y1="515" x2="850" y2="515" stroke="#999999" stroke-width="2" stroke-dasharray="8,4"/>
<rect x="60" y="530" width="350" height="54" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="235" y="549" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">처음부터 생성: 모범 사례 부족</text>
<text x="235" y="571" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="10.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">임시방편 컨텍스트 관리 · 비표준 도구 설계 · 낡은 API</text>
<rect x="470" y="530" width="350" height="54" rx="6" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="645" y="549" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">예시 기반 수정: 모범 사례 상속</text>
<text x="645" y="571" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="normal">표준 메시지 형식 · 표준 도구 설계 · 현대적 API</text>
</svg>