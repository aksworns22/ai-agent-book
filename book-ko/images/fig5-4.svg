<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 900 660" width="900" height="660" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>
<rect x="10.0" y="55" width="168" height="38" rx="6" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="94.0" y="74" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">Diff + Apply Model</text>
<rect x="10.0" y="101" width="168" height="116" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="16.0" y="117" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">LLM 출력 Diff 설명:</text>
<text x="16.0" y="134" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">- def foo(x):</text>
<text x="16.0" y="151" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">    return x</text>
<text x="16.0" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">+ def foo(x, y=0):</text>
<text x="16.0" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">+   return x + y</text>
<text x="16.0" y="202" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="7.5" fill="#333333" text-anchor="start" dominant-baseline="central">→ 소형 모델이 위치를 찾아 적용</text>
<rect x="14.0" y="229" width="160" height="80" rx="3" fill="#ffffff" stroke="#999999" stroke-width="2"/>
<text x="94.0" y="244.2" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">장점: 관심사의</text>
<text x="94.0" y="258.36" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">분리</text>
<text x="94.0" y="272.52000000000004" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">단점: 작은</text>
<text x="94.0" y="286.68000000000006" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">차이로도 위치가</text>
<text x="94.0" y="300.8400000000001" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">어긋남</text>
<rect x="188.0" y="55" width="168" height="38" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="272.0" y="74" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">이전 문자열 → 새 문자열</text>
<rect x="188.0" y="101" width="168" height="99" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="194.0" y="117" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">old: &quot;def foo(x):\n</text>
<text x="194.0" y="134" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">       return x&quot;</text>
<text x="194.0" y="151" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10.5" fill="#333333" text-anchor="start" dominant-baseline="central">new: &quot;def foo(x, y=0):\n</text>
<text x="194.0" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">       return x + y&quot;</text>
<text x="194.0" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="8" fill="#333333" text-anchor="start" dominant-baseline="central">→ 정확한 문자열 일치로 교체</text>
<rect x="192.0" y="229" width="160" height="80" rx="3" fill="#ffffff" stroke="#999999" stroke-width="2"/>
<text x="272.0" y="244.2" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">장점: 예측 가능하고</text>
<text x="272.0" y="258.36" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">모호하지 않음</text>
<text x="272.0" y="272.52000000000004" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">단점: 큰 블록 삭제 시</text>
<text x="272.0" y="286.68000000000006" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">전체 원문을</text>
<text x="272.0" y="300.8400000000001" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">출력해야 함</text>
<rect x="366.0" y="55" width="168" height="38" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="450.0" y="74" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="13.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">행 번호 지정</text>
<rect x="366.0" y="101" width="168" height="99" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="372.0" y="117" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="9.5" fill="#333333" text-anchor="start" dominant-baseline="central">42~43행을 지우고 삽입:</text>
<text x="372.0" y="134" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">  def foo(x, y=0):</text>
<text x="372.0" y="151" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">    return x + y</text>
<text x="372.0" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central"></text>
<text x="372.0" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="7" fill="#333333" text-anchor="start" dominant-baseline="central">→ 행 번호로 정확한 범위 지정</text>
<rect x="370.0" y="229" width="160" height="80" rx="3" fill="#ffffff" stroke="#999999" stroke-width="2"/>
<text x="450.0" y="244.2" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">장점: 큰 작업에</text>
<text x="450.0" y="258.36" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">효율적</text>
<text x="450.0" y="272.52000000000004" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">단점: 긴 파일에서는</text>
<text x="450.0" y="286.68000000000006" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">행 번호 오류가</text>
<text x="450.0" y="300.8400000000001" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">나기 쉬움</text>
<rect x="544.0" y="55" width="168" height="38" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="628.0" y="74" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Vim식 명령</text>
<rect x="544.0" y="101" width="168" height="99" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="550.0" y="117" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">42G  (42행으로 이동)</text>
<text x="550.0" y="134" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">cw   (단어 교체)</text>
<text x="550.0" y="151" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">dd   (행 삭제)</text>
<text x="550.0" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">yy/p (복사/붙여넣기)</text>
<text x="550.0" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="10.5" fill="#333333" text-anchor="start" dominant-baseline="central">→ 풍부한 편집 의미</text>
<rect x="548.0" y="229" width="160" height="80" rx="3" fill="#ffffff" stroke="#999999" stroke-width="2"/>
<text x="628.0" y="244.2" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">장점: 이동/재구성에</text>
<text x="628.0" y="258.36" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">효율적</text>
<text x="628.0" y="272.52000000000004" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">단점: 약한 모델은</text>
<text x="628.0" y="286.68000000000006" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">오류를 더 많이</text>
<text x="628.0" y="300.8400000000001" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">생성함</text>
<rect x="722.0" y="55" width="168" height="38" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="806.0" y="74" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">시작-끝 일치</text>
<rect x="722.0" y="101" width="168" height="99" rx="3" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="728.0" y="117" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">start: &quot;def foo(x):&quot;</text>
<text x="728.0" y="134" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">end:   &quot;    return x&quot;</text>
<text x="728.0" y="151" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">new: &quot;def foo(x, y=0):</text>
<text x="728.0" y="168" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">       return x + y&quot;</text>
<text x="728.0" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', monospace" font-size="8" fill="#333333" text-anchor="start" dominant-baseline="central">→ 경계만으로 위치를 찾음</text>
<rect x="726.0" y="229" width="160" height="80" rx="3" fill="#ffffff" stroke="#999999" stroke-width="2"/>
<text x="806.0" y="244.2" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">장점: 전체 출력 없이</text>
<text x="806.0" y="258.36" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">큰 블록 삭제</text>
<text x="806.0" y="272.52000000000004" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">단점: 경계 조합이</text>
<text x="806.0" y="286.68000000000006" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">고유해야</text>
<text x="806.0" y="300.8400000000001" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">함</text>
<line x1="30" y1="331" x2="870" y2="331" stroke="#999999" stroke-width="2" stroke-dasharray="8,4"/>
<text x="450.0" y="355" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">실제 채택 사례</text>
<text x="240" y="393" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="end" dominant-baseline="central" font-weight="bold">Old→New</text>
<rect x="250" y="379" width="408.0" height="28" rx="3" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="454.0" y="393" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="normal">Claude Code</text>
<text x="240" y="431" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="end" dominant-baseline="central" font-weight="bold">행 번호 지정</text>
<rect x="250" y="417" width="240.0" height="28" rx="3" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="370.0" y="431" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">IDE 깊은 통합 상황</text>
<text x="240" y="469" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="end" dominant-baseline="central" font-weight="bold">Diff + Apply</text>
<rect x="250" y="455" width="192.0" height="28" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="346.0" y="469" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Cursor</text>
<text x="240" y="507" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="end" dominant-baseline="central" font-weight="bold">시작-끝 일치</text>
<rect x="250" y="493" width="144.0" height="28" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="322.0" y="507" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="12.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">일부 맞춤형 해법</text>
<text x="240" y="545" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="14" fill="#333333" text-anchor="end" dominant-baseline="central" font-weight="bold">Vim 명령</text>
<rect x="250" y="531" width="72.0" height="28" rx="3" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="286.0" y="545" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="7" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">실험적 해법</text>
</svg>